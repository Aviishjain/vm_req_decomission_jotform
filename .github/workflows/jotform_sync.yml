name: Jotform to Google Sheets Sync

on:
  schedule:
    # 10:00 AM IST
    - cron: "30 4 * * *"

    # 5:00 PM IST
    - cron: "30 11 * * *"

  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas gspread google-auth

      - name: Create Google Credentials File
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          echo "$GOOGLE_CREDENTIALS_JSON" > quixotic-prism-502006-u3-86172ccb7319.json

      - name: Run Sync Script
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          JOTFORM_API_KEY: ${{ secrets.JOTFORM_API_KEY }}
        run: |
          python vm_req_jotform_data.py
